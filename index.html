<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>체중 기록</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>체중 기록</h1>
      <button class="goal-btn" id="goalBtn">목표 설정</button>
    </header>

    <div class="stats">
      <div class="stat-card">
        <span class="stat-label">현재 체중</span>
        <span class="stat-value" id="currentWeight">—</span>
        <span class="stat-unit">kg</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">시작 체중</span>
        <span class="stat-value" id="startWeight">—</span>
        <span class="stat-unit">kg</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">목표 체중</span>
        <span class="stat-value" id="goalWeight">—</span>
        <span class="stat-unit">kg</span>
      </div>
      <div class="stat-card" id="changeCard">
        <span class="stat-label">변화량</span>
        <span class="stat-value" id="weightChange">—</span>
        <span class="stat-unit">kg</span>
      </div>
    </div>

    <div class="card chart-card">
      <div class="period-filter">
        <button class="period-btn" data-period="1w">1주</button>
        <button class="period-btn" data-period="1m">1개월</button>
        <button class="period-btn active" data-period="3m">3개월</button>
        <button class="period-btn" data-period="all">전체</button>
      </div>
      <div class="chart-wrapper" id="chartWrapper">
        <div class="chart-empty">기록을 추가하면 그래프가 표시됩니다.</div>
      </div>
      <div class="chart-tooltip" id="chartTooltip"></div>
    </div>

    <div class="card">
      <h2>기록 추가</h2>
      <form id="recordForm">
        <div class="form-row">
          <div class="form-group">
            <label for="date">날짜</label>
            <input type="date" id="date" required>
          </div>
          <div class="form-group">
            <label for="weight">체중 (kg)</label>
            <input type="number" id="weight" step="0.1" min="1" max="999" placeholder="0.0" required>
          </div>
        </div>
        <div class="form-group">
          <label for="memo">메모 (선택)</label>
          <input type="text" id="memo" placeholder="식단, 컨디션 등...">
        </div>
        <div class="toggle-row">
          <button type="button" class="toggle-btn exercise-btn" id="exerciseBtn">
            🏃 운동 <span class="check-icon">✓</span>
          </button>
          <button type="button" class="toggle-btn drink-btn" id="drinkBtn">
            🍺 음주 <span class="check-icon">✓</span>
          </button>
        </div>
        <button type="submit" class="submit-btn">추가</button>
      </form>
    </div>

    <div class="card">
      <h2>기록 목록</h2>
      <div id="recordsList" class="records-list">
        <p class="empty-msg">아직 기록이 없어요.</p>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="goalModal">
    <div class="modal">
      <h3>목표 체중 설정</h3>
      <div class="form-group">
        <label for="goalInput">목표 체중 (kg)</label>
        <input type="number" id="goalInput" step="0.1" min="1" max="999" placeholder="0.0">
      </div>
      <div class="modal-actions">
        <button class="cancel-btn" id="cancelGoal">취소</button>
        <button class="submit-btn" id="saveGoal">저장</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
