<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>체중 기록</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>체중 기록</h1>
      <div class="header-actions">
        <button class="action-btn" id="themeBtn">🌙</button>
        <button class="action-btn" id="importBtn">가져오기</button>
        <button class="action-btn" id="exportBtn">내보내기</button>
        <button class="action-btn" id="goalBtn">목표 설정</button>
      </div>
    </header>
    <input type="file" id="importFile" accept=".json" style="display:none">

    <div class="stats">
      <div class="stat-card">
        <span class="stat-label">현재 체중</span>
        <span class="stat-value" id="currentWeight">—</span>
        <span class="stat-unit">kg</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">시작 체중</span>
        <span class="stat-value" id="startWeight">—</span>
        <span class="stat-unit">kg</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">목표 체중</span>
        <span class="stat-value" id="goalWeight">—</span>
        <span class="stat-unit">kg</span>
      </div>
      <div class="stat-card" id="changeCard">
        <span class="stat-label">변화량</span>
        <span class="stat-value" id="weightChange">—</span>
        <span class="stat-unit">kg</span>
      </div>
    </div>

    <div class="card" id="dailyMissions"></div>

    <div class="card chart-card">
      <div class="period-filter">
        <button class="period-btn" data-period="1w">1주</button>
        <button class="period-btn" data-period="1m">1개월</button>
        <button class="period-btn active" data-period="3m">3개월</button>
        <button class="period-btn" data-period="all">전체</button>
      </div>
      <div class="chart-wrapper" id="chartWrapper">
        <div class="chart-empty">기록을 추가하면 그래프가 표시됩니다.</div>
      </div>
      <div class="chart-tooltip" id="chartTooltip"></div>
    </div>

    <div class="card">
      <h2>기록 추가</h2>
      <form id="recordForm">
        <div class="form-row">
          <div class="form-group">
            <label for="date">날짜</label>
            <input type="date" id="date" required>
          </div>
          <div class="form-group">
            <label for="weight">체중 (kg)</label>
            <input type="number" id="weight" step="0.1" min="1" max="999" placeholder="0.0" required>
          </div>
        </div>
        <div class="form-group">
          <label for="memo">메모 (선택)</label>
          <input type="text" id="memo" placeholder="식단, 컨디션 등...">
        </div>
        <div class="toggle-row">
          <button type="button" class="toggle-btn exercise-btn" id="exerciseBtn">
            🏃 운동 <span class="check-icon">✓</span>
          </button>
          <button type="button" class="toggle-btn drink-btn" id="drinkBtn">
            🍺 음주 <span class="check-icon">✓</span>
          </button>
        </div>
        <button type="submit" class="submit-btn">추가</button>
      </form>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>기록 목록</h2>
        <button class="expand-btn" id="expandRecordsBtn" title="전체화면">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
          </svg>
        </button>
      </div>
      <div id="recordsList" class="records-list">
        <p class="empty-msg">아직 기록이 없어요.</p>
      </div>
    </div>
  </div>

  <div class="records-fullscreen" id="recordsFullscreen">
    <div class="records-fullscreen-header">
      <h2>기록 목록 <span class="records-count" id="recordsCount"></span></h2>
      <button class="close-fs-btn" id="closeFullscreen">✕</button>
    </div>
    <div id="recordsFullList" class="records-list-full"></div>
  </div>

  <div class="modal-overlay" id="goalModal">
    <div class="modal">
      <h3>목표 체중 설정</h3>
      <div class="form-group">
        <label for="goalInput">목표 체중 (kg)</label>
        <input type="number" id="goalInput" step="0.1" min="1" max="999" placeholder="0.0">
      </div>
      <div class="modal-actions">
        <button class="cancel-btn" id="cancelGoal">취소</button>
        <button class="submit-btn" id="saveGoal">저장</button>
      </div>
    </div>
  </div>

  <div class="mission-settings" id="missionSettings">
    <div class="ms-panel">
      <div class="ms-header">
        <h2>⚙️ 미션 관리</h2>
        <button class="close-fs-btn" id="closeMissionSettings">✕</button>
      </div>
      <div class="ms-body">
        <h3 class="ms-section-title">기본 미션</h3>
        <div id="msDefaultList"></div>

        <h3 class="ms-section-title">나만의 미션 추가</h3>
        <form id="msAddForm" class="ms-add-form">
          <input type="text" id="msNewIcon" placeholder="😊 이모티콘을 넣으세요" maxlength="2" class="ms-icon-input">
          <textarea id="msNewLabel" placeholder="미션을 적어주세요" class="ms-label-input" rows="2" required></textarea>
          <button type="submit" class="submit-btn ms-submit">+ 미션 추가</button>
        </form>

        <h3 class="ms-section-title">나만의 미션 <span class="records-count" id="msCustomCount"></span></h3>
        <div id="msCustomList"></div>
      </div>
    </div>
  </div>

  <div class="mission-settings" id="phrasesPanel">
    <div class="ms-panel">
      <div class="ms-header">
        <h2>💬 완료 멘트 관리</h2>
        <button class="close-fs-btn" id="closePhrases">✕</button>
      </div>
      <div class="ms-body">
        <h3 class="ms-section-title">완료 시 랜덤으로 말해줘요</h3>
        <div id="phrasesList"></div>

        <h3 class="ms-section-title">멘트 추가</h3>
        <form id="phrasesAddForm" class="ms-add-form">
          <input type="text" id="phrasesNewText" placeholder="새 멘트를 입력하세요" class="ms-icon-input" required>
          <button type="submit" class="submit-btn ms-submit">+ 추가</button>
        </form>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <!-- Tabata FAB -->
  <button class="tabata-fab" id="tabataFab">⏱️</button>

  <!-- Tabata Overlay -->
  <div class="tabata-overlay" id="tabataOverlay">
    <div class="tabata-panel">
      <div class="tabata-header">
        <h2>⏱️ 타바타 타이머</h2>
        <div class="tabata-header-actions">
          <button class="close-fs-btn" id="tabataPhrasesBtn" title="완료 멘트 관리">💬</button>
          <button class="close-fs-btn" id="tabataClose">✕</button>
        </div>
      </div>

      <!-- 설정 화면 -->
      <div id="tabataIdle" class="tabata-idle">
        <!-- 웜업 -->
        <div class="tabata-settings tabata-settings--warmup">
          <div class="tabata-setting-row">
            <span class="tabata-setting-label tabata-setting-label--warmup">웜업 시간</span>
            <div class="tabata-stepper">
              <button class="stepper-btn" id="warmupDec">−</button>
              <span class="stepper-val"><span id="warmupTimeSec">0</span><span class="stepper-unit">초</span></span>
              <button class="stepper-btn" id="warmupInc">+</button>
            </div>
          </div>
        </div>
        <!-- 타바타 -->
        <div class="tabata-settings">
          <div class="tabata-setting-row">
            <span class="tabata-setting-label">운동 시간</span>
            <div class="tabata-stepper">
              <button class="stepper-btn" id="exDec">−</button>
              <span class="stepper-val"><span id="exTimeSec">40</span><span class="stepper-unit">초</span></span>
              <button class="stepper-btn" id="exInc">+</button>
            </div>
          </div>
          <div class="tabata-setting-row">
            <span class="tabata-setting-label">휴식 시간</span>
            <div class="tabata-stepper">
              <button class="stepper-btn" id="restDec">−</button>
              <span class="stepper-val"><span id="restTimeSec">10</span><span class="stepper-unit">초</span></span>
              <button class="stepper-btn" id="restInc">+</button>
            </div>
          </div>
          <div class="tabata-setting-row">
            <span class="tabata-setting-label">라운드</span>
            <div class="tabata-stepper">
              <button class="stepper-btn" id="roundDec">−</button>
              <span class="stepper-val"><span id="roundCount">8</span><span class="stepper-unit">회</span></span>
              <button class="stepper-btn" id="roundInc">+</button>
            </div>
          </div>
        </div>
        <!-- 쿨다운 -->
        <div class="tabata-settings tabata-settings--cooldown">
          <div class="tabata-setting-row">
            <span class="tabata-setting-label tabata-setting-label--cooldown">쿨다운 시간</span>
            <div class="tabata-stepper">
              <button class="stepper-btn" id="cooldownDec">−</button>
              <span class="stepper-val"><span id="cooldownTimeSec">0</span><span class="stepper-unit">초</span></span>
              <button class="stepper-btn" id="cooldownInc">+</button>
            </div>
          </div>
        </div>
        <button class="tabata-action-btn" id="tabataStart">시작</button>
      </div>

      <!-- 타이머 화면 -->
      <div id="tabataRunning" class="tabata-running" style="display:none">
        <div class="tabata-phase-label" id="tabataPhaseLabel">준비</div>
        <div class="tabata-round-label" id="tabataRoundLabel">시작 준비</div>
        <div class="tabata-time-display" id="tabataTimeDisplay">3</div>
        <div class="tabata-timer-controls">
          <button class="tabata-ctrl-btn" id="tabataPause">일시정지</button>
          <button class="tabata-ctrl-btn tabata-ctrl-btn--secondary" id="tabataReset">처음으로</button>
        </div>
        <div class="tabata-add-time-row">
          <button class="tabata-add-time-btn" id="tabataAddTime">+30초</button>
        </div>
      </div>

      <!-- 완료 화면 -->
      <div id="tabataDone" class="tabata-done" style="display:none">
        <div class="tabata-done-emoji">🎉</div>
        <div class="tabata-done-text">완료!</div>
        <p class="tabata-done-sub" id="tabataDoneSub"></p>
        <button class="tabata-action-btn" id="tabataAgain">다시 하기</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
